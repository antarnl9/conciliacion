<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Conciliación · T1 Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#fff; --oxford:#4C4C4C;
    --red-50:#FEF4F4; --red-100:#F9D2D2; --red-500:#DB3B2B; --red-600:#DB362B; --red-700:#CC0000;
    --gray-50:#F8F8F8; --gray-100:#F3F3F3; --gray-200:#E7E7E7; --gray-300:#DBDBDB; --gray-400:#CFCFCF;
    --gray-600:#9CA3AF; --gray-700:#6B7280; --gray-800:#4B5563; --gray-900:#1F2937;
    --green-100:#F0FDF4; --green-700:#16A34A;
    --orange-100:#FFF0E5; --orange-700:#CC5200;
    --yellow-100:#FFF4BF; --yellow-700:#A96A00;
    --blue-100:#F0F8FF; --blue-500:#2180FF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--white);color:var(--oxford);font-family:Manrope,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.366;display:flex;min-height:100vh;font-size:14px}
  /* ---------- sidebar ---------- */
  aside{width:240px;flex:0 0 240px;background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;color:var(--gray-900);padding:4px 10px 18px}
  .brand .mark{width:26px;height:26px;border-radius:7px;background:var(--red-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  nav{display:flex;flex-direction:column;gap:2px}
  .grouplbl{font-size:11px;font-weight:600;color:var(--gray-600);text-transform:uppercase;letter-spacing:.05em;padding:14px 10px 6px}
  nav a{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:var(--gray-700);text-decoration:none;cursor:pointer;font-weight:500;font-size:13.5px}
  nav a:hover{background:var(--gray-50);color:var(--oxford)}
  nav a.active{background:var(--red-50);color:var(--red-500);font-weight:600}
  nav a.sub{padding-left:30px;font-size:13px}
  .spacer{flex:1}
  .footer{border-top:1px solid var(--gray-200);padding-top:12px;display:flex;flex-direction:column;gap:7px}
  .job{font-size:11.5px;color:var(--gray-600);min-height:15px;padding:2px 4px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
  .dot.run{background:#EDBD55;animation:pulse 1s infinite}.dot.ok{background:var(--green-700)}.dot.err{background:var(--red-700)}
  @keyframes pulse{50%{opacity:.35}}
  /* ---------- main ---------- */
  main{flex:1;padding:24px 28px;overflow:auto;background:var(--white)}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  h1.title{font-size:24px;font-weight:700;color:var(--oxford);margin:0}
  .sub{color:var(--gray-700);font-size:13px;margin-top:3px}
  /* botones */
  button,.btn{font-family:inherit;border:0;border-radius:10px;height:36px;padding:0 15px;font-weight:600;font-size:13.5px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn-primary{background:var(--red-500);color:#fff}.btn-primary:hover{background:var(--red-600)}
  .btn-secondary{background:#fff;border:1px solid var(--gray-200);color:var(--oxford)}.btn-secondary:hover{background:var(--gray-50)}
  .btn-sm{height:30px;font-size:12.5px;padding:0 11px}
  button:disabled{opacity:.5;cursor:not-allowed}
  label.file{display:inline-block}label.file input{display:none}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .kpi{border:1px solid var(--gray-200);border-radius:12px;padding:14px 16px;background:#fff}
  .kpi .lbl{color:var(--gray-600);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .kpi .val{font-size:23px;font-weight:700;color:var(--gray-900);margin-top:6px}
  .kpi.green .val{color:var(--green-700)}.kpi.red .val{color:var(--red-700)}.kpi.orange .val{color:var(--orange-700)}
  /* tabla Nexus */
  .card{border:1px solid var(--gray-200);border-radius:12px;overflow:hidden;background:#fff}
  .tblwrap{overflow:auto;max-height:68vh}
  table{width:100%;border-collapse:collapse}
  thead th{position:sticky;top:0;z-index:2;background:var(--blue-100);color:var(--gray-600);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;text-align:right;padding:11px 12px;border-bottom:1px solid var(--gray-200);white-space:nowrap}
  thead th:first-child{text-align:left}
  tbody td{font-size:12px;font-weight:500;color:var(--oxford);text-align:right;padding:10px 12px;border-bottom:1px solid var(--gray-200);white-space:nowrap}
  tbody td:first-child{text-align:left}
  tbody tr:hover{background:var(--gray-50)}
  .neg{color:var(--red-700)}.pos{color:var(--green-700)}
  .badge{display:inline-flex;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
  .b-green{background:var(--green-100);color:var(--green-700)}.b-orange{background:var(--orange-100);color:var(--orange-700)}
  .b-yellow{background:var(--yellow-100);color:var(--yellow-700)}.b-red{background:var(--red-50);color:var(--red-700)}
  .b-blue{background:var(--blue-100);color:var(--blue-500)}.b-gray{background:var(--gray-100);color:var(--gray-700)}
  /* filtros / inputs */
  .filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  input,select{font-family:inherit;background:#fff;border:1px solid var(--gray-200);color:var(--oxford);border-radius:10px;height:34px;padding:0 10px;font-size:13px}
  input:focus,select:focus{outline:none;border-color:var(--gray-400)}
  input[type=date]{height:34px}
  .pager{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--gray-200);padding:11px 14px;font-size:12px;color:var(--oxford)}
  .pgbtn{height:26px;min-width:26px;border-radius:6px;border:1px solid var(--gray-200);background:#fff;font-size:12px}
  .muted{color:var(--gray-600)}
  .empty{padding:60px 20px;text-align:center;color:var(--gray-600)}
  .empty h3{color:var(--oxford);font-size:16px;font-weight:600;margin:0 0 6px}
  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;width:540px;max-width:92vw;max-height:88vh;overflow:auto;box-shadow:0 12px 44px rgba(0,0,0,.25)}
  .modal-head{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--gray-200)}
  .modal-head h3{margin:0;font-size:18px;font-weight:700;color:var(--gray-900);flex:1}
  .modal-head .x{background:none;color:var(--gray-600);width:30px;height:30px;padding:0;font-size:16px}
  .modal-body{padding:18px 22px}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 22px;border-top:1px solid var(--gray-200)}
  .lblform{font-size:12px;font-weight:600;color:var(--gray-700);text-transform:uppercase;letter-spacing:.04em;display:block;margin:0 0 7px}
  .crow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
  .crow .nm{flex:1;display:flex;align-items:center;gap:9px;font-weight:600;color:var(--oxford)}
  .crow.off{opacity:.4}
  .crow .fname{font-size:11.5px;color:var(--green-700);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cm-chk{accent-color:var(--red-500);width:15px;height:15px;cursor:pointer}
  .plist{display:flex;flex-direction:column}
  .pstep{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:1px solid var(--gray-100);font-size:13.5px;color:var(--gray-600)}
  .pstep .pic{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:2px solid var(--gray-200);box-sizing:border-box}
  .pstep.run{color:var(--oxford);font-weight:600}
  .pstep.run .pic{border-color:var(--red-500);border-top-color:transparent;animation:spin .7s linear infinite}
  .pstep.done{color:var(--oxford)}
  .pstep.done .pic{background:var(--green-700);border-color:var(--green-700);color:#fff}
  .pstep.err{color:var(--red-700)} .pstep.err .pic{background:var(--red-700);border-color:var(--red-700);color:#fff}
  .pstep .pex{margin-left:auto;font-size:11.5px;color:var(--gray-600);font-weight:400;text-align:right}
  @keyframes spin{to{transform:rotate(360deg)}}
  .kebab{background:#fff;border:1px solid var(--gray-200);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--gray-700);line-height:1;padding:0;flex-shrink:0}
  .kebab:hover{background:var(--blue-100)}
  .dropmenu{position:fixed;background:#fff;border:1px solid var(--gray-200);border-radius:9px;box-shadow:0 10px 30px rgba(0,0,0,.12);min-width:186px;z-index:1200;overflow:hidden;display:none}
  .dropmenu.show{display:block}
  .dropmenu a,.dropmenu label{display:block;padding:10px 15px;font-size:13px;color:var(--oxford);cursor:pointer;white-space:nowrap;text-decoration:none}
  .dropmenu a:hover,.dropmenu label:hover{background:var(--blue-100)}
  .dkpi{display:flex;gap:22px;flex-wrap:wrap;background:var(--blue-100);border:1px solid var(--gray-200);border-radius:9px;padding:13px 16px;margin-bottom:16px}
  .dkpi .b{font-size:11px;color:var(--gray-600);text-transform:uppercase;letter-spacing:.03em}
  .dkpi .v{font-size:16px;font-weight:700;color:var(--heading,#1F2937)}
  .seg{display:inline-flex;border:1px solid var(--gray-200);border-radius:9px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:9px 16px;font-size:13px;color:var(--gray-700);cursor:pointer;font-family:inherit;white-space:nowrap}
  .seg button+button{border-left:1px solid var(--gray-200)}
  .seg button.active{background:var(--red-500);color:#fff;font-weight:600}
  .seg button:not(.active):hover{background:var(--blue-100)}
  .cfgrow{display:flex;align-items:flex-end;gap:26px;flex-wrap:wrap}
  .cfgrow .lblform{margin-bottom:7px}
  tr.overdue td{background:var(--red-50)}
  .login-ov{position:fixed;inset:0;background:#f3f5f8;display:none;align-items:center;justify-content:center;z-index:1000}
  .login-ov.show{display:flex}
  .login-card{background:#fff;border:1px solid var(--gray-200);border-radius:14px;padding:34px 30px;width:340px;box-shadow:0 12px 44px rgba(0,0,0,.10)}
  .login-card h2{margin:14px 0 4px;font-size:20px;color:var(--gray-900)}
  .login-card .sub{margin:0 0 20px;font-size:13px;color:var(--gray-600)}
  .login-card input{width:100%;margin-bottom:12px;padding:11px 12px;border:1px solid var(--gray-200);border-radius:9px;font-size:14px;font-family:inherit}
  .login-card .err{color:var(--red-500);font-size:12.5px;min-height:17px;margin-bottom:6px}
  .login-card button{width:100%}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="login-ov" id="login">
  <form class="login-card" onsubmit="return doLogin(event)">
    <div class="brand"><span class="mark">T1</span> Conciliación</div>
    <h2>Iniciar sesión</h2>
    <div class="sub">Acceso del equipo de finanzas.</div>
    <input type="email" id="lg-email" placeholder="correo@t1envios.com" autocomplete="username" required>
    <input type="password" id="lg-pass" placeholder="Contraseña" autocomplete="current-password" required>
    <div class="err" id="lg-err"></div>
    <button class="btn-primary" type="submit" id="lg-btn">Entrar</button>
  </form>
</div>
<aside>
  <div class="brand"><span class="mark">T1</span> Conciliación</div>
  <nav id="nav">
    <a data-v="cierre" class="active">Cierre de mes</a>
    <a data-v="cobranza">Cobranza</a>
    <a data-v="tarifas">Configuración de tarifas</a>
    <div class="grouplbl">Reportes</div>
    <a data-v="rep-prepago" class="sub">Prepago</a>
    <a data-v="rep-credito" class="sub">Crédito</a>
    <a data-v="rep-cobrar" class="sub">Por cobrar</a>
    <a data-v="rep-guias" class="sub">Detalle por guía</a>
  </nav>
  <div class="spacer"></div>
  <div class="footer">
    <div class="job" id="job"></div>
    <button class="btn-secondary btn-sm" id="b-logout" onclick="doLogout()" style="display:none;width:100%;margin-top:6px">Cerrar sesión</button>
  </div>
</aside>

<main><div id="view"></div></main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h3 id="cm-title">Cierre de mes</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="cm-body"></div>
    <div class="modal-foot" id="cm-foot"></div>
  </div>
</div>

<div class="modal-overlay" id="modal2">
  <div class="modal" style="max-width:760px">
    <div class="modal-head"><h3 id="m2-title">Detalle de cobro</h3><button class="x" onclick="closeModal2()">✕</button></div>
    <div class="modal-body" id="m2-body"></div>
  </div>
</div>

<div class="dropmenu" id="rowmenu"></div>

<script>
let TOKEN=null, SB=null, AUTH=false;
const _fetch=window.fetch.bind(window);
// Inyecta el token de Supabase a toda llamada /api/*.
window.fetch=(u,o={})=>{
  if(typeof u==='string' && u.startsWith('/api/') && TOKEN)
    o.headers={...(o.headers||{}), Authorization:'Bearer '+TOKEN};
  return _fetch(u,o);
};
// Los <a href> de descarga no mandan headers: les agrega ?token=.
const dl=u=>TOKEN?u+(u.includes('?')?'&':'?')+'token='+encodeURIComponent(TOKEN):u;
const $=s=>document.querySelector(s);
const fmt=n=>n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:0});
const money=n=>n==null?'—':'$'+fmt(n);
const cls=n=>(n||0)<0?'neg':'pos';
const jget=u=>fetch(u).then(r=>r.json());
const jpost=(u,b)=>fetch(u,{method:'POST',headers:b?{'Content-Type':'application/json'}:{},body:b?JSON.stringify(b):undefined}).then(r=>r.json());
const BADGE={'Cobrado OK':'b-green','Extra por cobrar':'b-orange','Sobrepeso pendiente':'b-orange','Falta cobrar (credito)':'b-yellow','Cobrado, costo pendiente':'b-blue','Cobrado bajo costo':'b-red','Interno (14%)':'b-blue','Sin guia en sistema':'b-gray'};
const badge=s=>`<span class="badge ${BADGE[s]||'b-gray'}">${s}</span>`;
let VIEW='cierre';

function tbl(cols, rows, rowfn, footer=''){
  return `<div class="card"><div class="tblwrap"><table>
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows.length?rows.map(rowfn).join(''):`<tr><td colspan="${cols.length}"><div class="empty"><h3>Sin datos</h3><p>Sube los archivos y reconcilia para ver resultados.</p></div></td></tr>`}</tbody>
  </table></div>${footer}</div>`;
}
function toolbar(title, sub, actions=''){
  return `<div class="toolbar"><div><h1 class="title">${title}</h1>${sub?`<div class="sub">${sub}</div>`:''}</div><div style="display:flex;gap:8px">${actions}</div></div>`;
}

const views = {
  // ---------- CIERRE DE MES (home) ----------
  async cierre(){
    const k = (await jget('/api/status')).kpis || {};
    const meses = await jget('/api/cierre/meses');
    $('#view').innerHTML =
      toolbar('Cierre de mes','Costo de paqueterías, ingreso y utilidad por periodo',
        `<button class="btn-primary" onclick="openCierreModal()">+ Nuevo cierre de mes</button>`) +
      `<div class="kpis">
        <div class="kpi"><div class="lbl">Costo paqueterías</div><div class="val">${money(k.costo)}</div></div>
        <div class="kpi green"><div class="lbl">Ingreso realizado</div><div class="val">${money(k.ingreso)}</div></div>
        <div class="kpi"><div class="lbl">Utilidad realizada</div><div class="val">${money(k.margen)}</div></div>
        <div class="kpi orange"><div class="lbl">Por cobrar</div><div class="val">${money(k.por_cobrar)}</div></div>
        <div class="kpi"><div class="lbl">Cobrado por devengar</div><div class="val" style="color:var(--blue-500)">${money(k.por_devengar)}</div></div>
      </div>` +
      tbl(['Mes','Guías','Costo','Ingreso','Utilidad','Por cobrar','Por devengar','Estatus',''], meses, m=>
        `<tr style="cursor:pointer" onclick="openDetalleMes('${m.mes}')" title="Ver detalle por cliente y paquetería">
         <td><b>${m.mes}</b></td><td>${fmt(m.guias)}</td><td>${money(m.costo)}</td><td>${money(m.ingreso)}</td>
         <td class="${cls(m.utilidad)}">${money(m.utilidad)}</td><td class="${m.por_cobrar>0?'neg':''}">${money(m.por_cobrar)}</td>
         <td style="color:var(--blue-500)">${money(m.por_devengar)}</td>
         <td>${m.estatus==='cerrado'?'<span class="badge b-green">Cerrado</span>':'<span class="badge b-gray">Abierto</span>'}</td>
         <td style="white-space:nowrap">${m.estatus==='cerrado'
            ? `<button class="btn-secondary btn-sm" onclick="event.stopPropagation();openCierreModal('${m.mes}')">Editar</button> <button class="btn-secondary btn-sm" onclick="event.stopPropagation();reabrirMes('${m.mes}')">Reabrir</button>`
            : `<button class="btn-primary btn-sm" onclick="event.stopPropagation();openCierreModal('${m.mes}')">Cerrar mes</button>`}</td></tr>`);
  },
  // ---------- CONFIGURACIÓN DE TARIFAS ----------
  async tarifas(){
    const cls = await jget('/api/tarifas/clientes');
    window.TARCLI = cls;
    const opts = cls.map(c=>`<option value="${c.seller_id}">${c.cliente} · ${c.filas_tarifa} tarifas</option>`).join('');
    $('#view').innerHTML = toolbar('Configuración de tarifas','Por cliente de crédito: cobro automático (del sistema) o manual (tarifa por paquetería, zona y kilo)') +
      `<div class="filters"><span class="muted">Cliente:</span>
         <select id="t-cliente" style="min-width:340px" onchange="onCliente()">${opts}</select></div>
       <div class="card" style="padding:18px;margin-bottom:16px">
         <div class="cfgrow">
           <div>
             <span class="lblform">Tipo de cobro</span>
             <div class="seg" id="t-cobro">
               <button data-v="automatica" onclick="setCobro('automatica')">Automático (del sistema)</button>
               <button data-v="manual" onclick="setCobro('manual')">Manual (tarifa)</button>
             </div>
           </div>
           <div><span class="lblform" title="Margen para extras: piso = costo×(1+margen)">Margen % (extras)</span>
             <input id="t-margen" type="number" step="1" placeholder="14" style="width:96px" onchange="setMargen()"></div>
           <div><span class="lblform">Días de crédito</span>
             <input id="t-dias" type="number" step="1" placeholder="30" style="width:96px" onchange="setDias()"></div>
         </div>
       </div>
       <div id="tar-body"></div>`;
    onCliente();
  },
  // ---------- COBRANZA (libro de cuentas por cobrar) ----------
  async cobranza(){
    const meses = await jget('/api/cierre/meses');
    if(!window.COBMES) window.COBMES=(meses.find(m=>m.estatus!=='cerrado')||meses[0]||{}).mes||'';
    const opts = meses.map(m=>`<option value="${m.mes}" ${m.mes===COBMES?'selected':''}>${m.mes}</option>`).join('');
    const rows = await jget('/api/cobros?mes='+COBMES);
    const tot = rows.reduce((a,r)=>a+(r.monto||0),0);
    const pagado = rows.reduce((a,r)=>a+(r.pagado||0),0);
    const venc = rows.filter(r=>r.dias_atraso>0).length;
    const ESTB={generado:'b-gray',enviado:'b-blue',aprobado:'b-yellow',parcial:'b-orange',pagado:'b-green'};
    $('#view').innerHTML = toolbar('Cobranza',
        `${COBMES} · por cobrar $${fmt(tot)} · pagado $${fmt(pagado)} · saldo $${fmt(tot-pagado)} · ${venc} vencidos`, '') +
      `<div class="filters"><span class="muted">Mes:</span><select id="cob-mes" onchange="cobMes()">${opts}</select>
         <button class="btn-secondary btn-sm" style="margin-left:auto" onclick="generarCobro()" title="Recalcula el cobro del mes desde la conciliación. Úsalo si cambiaste un margen o una tarifa (conserva pagos registrados).">↻ Regenerar</button></div>` +
      (rows.length ? tbl(['Cliente','Tipo','Guías','Monto','Pagado','Saldo','Vence','Estatus',''], rows, r=>{
        const vence=r.fecha_vencimiento ? `${r.fecha_vencimiento}${r.dias_atraso>0?` <span style="color:var(--red-700);font-weight:600">+${r.dias_atraso}d</span>`:''}` : '—';
        const nb = r.estatus==='generado' ? `<button class="btn-primary btn-sm" onclick="enviarFactura(${r.seller_id})">Enviar factura</button>`
          : r.estatus==='enviado' ? `<button class="btn-primary btn-sm" onclick="aprobarCobro(${r.seller_id})">Aprobar</button>`
          : (r.estatus==='aprobado'||r.estatus==='parcial') ? `<button class="btn-primary btn-sm" onclick="verCobroDetalle(${r.seller_id})">Registrar pago</button>`
          : `<button class="btn-secondary btn-sm" onclick="verCobroDetalle(${r.seller_id})">Ver detalle</button>`;
        return `<tr class="${r.dias_atraso>0?'overdue':''}"><td><b>${r.cliente||'—'}</b></td>
          <td><span class="badge ${r.tipo==='credito'?'b-blue':'b-gray'}">${r.tipo}${r.concepto==='extra'?' · extra':''}</span></td>
          <td>${fmt(r.guias)}</td><td><b>${money(r.monto)}</b></td><td>${money(r.pagado)}</td>
          <td class="${r.saldo>0.5?'neg':'pos'}"><b>${money(r.saldo)}</b></td>
          <td style="font-size:12px;white-space:nowrap">${vence}</td>
          <td><span class="badge ${ESTB[r.estatus]||'b-gray'}">${r.estatus}</span></td>
          <td><div style="display:flex;gap:7px;align-items:center;justify-content:flex-end">${nb}
            <button class="kebab" onclick="openRowMenu(${r.seller_id},${r.saldo},'${r.estatus}',${r.tiene_pdf?1:0},event)">⋮</button></div></td></tr>`;})
      : `<div class="card"><div class="empty"><h3>Sin cobro generado para ${COBMES}</h3><p>El cobro se genera solo al cerrar el mes. Si ya cerraste y no aparece, usa "↻ Regenerar".</p></div></div>`);
  },
  rep_prepago: null, // placeholders set below
};

function renderTarBody(){
  if(TAR.cobro!=='manual'){
    $('#tar-body').innerHTML=`<div class="card"><div class="empty"><h3>Cobro automático</h3><p>Este cliente se cobra directo del sistema (precio + sobrepeso). No requiere tarifa.</p></div></div>`;

window.onCarrier=function(){TAR.carrier=$('#t-carrier').value;loadTarifas();};
function tarGridHTML(rows){
  const body=(rows.length?rows:[{}]).map((r,i)=>
    `<tr data-i="${i}">
      <td><input class="tz" value="${r.zona||''}" placeholder="Zona" style="width:100px"></td>
      <td><input class="tpmin" type="number" step="any" value="${r.peso_min??''}" placeholder="0" style="width:80px;text-align:right"></td>
      <td><input class="tpmax" type="number" step="any" value="${r.peso_max??''}" placeholder="∞" style="width:80px;text-align:right"></td>
      <td><input class="tpre" type="number" step="any" value="${r.precio??''}" placeholder="$" style="width:90px;text-align:right"></td>
      <td><input class="tvd" type="date" value="${(r.vigencia_desde||'').slice(0,10)}"></td>
      <td><input class="tvh" type="date" value="${(r.vigencia_hasta||'').slice(0,10)}"></td>
      <td><button class="btn-secondary btn-sm" onclick="delTarifa(${i})">✕</button></td></tr>`).join('');
  return `<div class="card"><div class="tblwrap"><table>
    <thead><tr><th>Zona</th><th>Peso min (kg)</th><th>Peso max (kg)</th><th>Precio</th><th>Vigencia desde</th><th>Vigencia hasta</th><th></th></tr></thead>
    <tbody>${body}</tbody></table></div></div>`;
}
function readTarRows(){
  return [...document.querySelectorAll('#tar-grid tr[data-i]')].map(tr=>({
    zona:tr.querySelector('.tz').value, peso_min:tr.querySelector('.tpmin').value,
    peso_max:tr.querySelector('.tpmax').value, precio:tr.querySelector('.tpre').value,
    vigencia_desde:tr.querySelector('.tvd').value, vigencia_hasta:tr.querySelector('.tvh').value,
  })).filter(r=>r.zona||r.precio);
}
async function loadTarifas(){
  const rows=await jget(`/api/tarifas?seller_id=${TAR.seller_id}&carrier=${encodeURIComponent(TAR.carrier)}`);
  $('#tar-grid').innerHTML=tarGridHTML(rows);
}
window.addTarifa=()=>{const rows=readTarRows();rows.push({});$('#tar-grid').innerHTML=tarGridHTML(rows);};
window.delTarifa=i=>{const rows=readTarRows();rows.splice(i,1);$('#tar-grid').innerHTML=tarGridHTML(rows);};
window.saveTarifas=async()=>{
  const rows=readTarRows();
  await jpost('/api/tarifas',{seller_id:Number(TAR.seller_id),cliente:TAR.cliente,carrier:TAR.carrier,rows});
  alert(`Guardadas ${rows.length} tarifas (${TAR.carrier.toUpperCase()}) para ${TAR.cliente}`); loadTarifas();
};

const G={limit:100,offset:0};
async function repGuias(offset=0){
  G.offset=offset;
  const p=new URLSearchParams({limit:G.limit,offset:G.offset});
  ['q','cliente','estatus','tipo'].forEach(k=>{const e=document.getElementById('g-'+k);if(e&&e.value)p.set(k,e.value);});
  const qs=dateQS(); const d=await jget('/api/guias?'+p+(qs?'&'+qs:''));
  const from=d.total?G.offset+1:0, to=Math.min(G.offset+G.limit,d.total);
  $('#view').innerHTML = toolbar('Reportes · Detalle por guía') + dateBar() +
    `<div class="filters">
      <input id="g-q" placeholder="buscar guía…" value="${vof('g-q')}">
      <input id="g-cliente" placeholder="cliente…" value="${vof('g-cliente')}">
      <select id="g-tipo">${opt('g-tipo',['','prepago','credito','interno','sin_sistema'],['(tipo)','prepago','crédito','interno','sin sistema'])}</select>
      <select id="g-estatus">${opt('g-estatus',['','Cobrado OK','Sobrepeso pendiente','Falta cobrar (credito)','Cobrado bajo costo','Interno (14%)','Sin guia en sistema'],['(estatus)'])}</select>
      <button class="btn-secondary btn-sm" onclick="repGuias(0)">Filtrar</button>
    </div>` +
    tbl(['Guía','Cliente','Tipo','Estatus','Ret','Costo','Precio','Sobrepeso','Ingreso','Margen','Mes'], d.rows, r=>
      `<tr><td>${r.guia}</td><td>${r.cliente_real||'—'}</td><td>${r.tipo}</td><td>${badge(r.estatus)}</td>
       <td>${r.es_retorno?'↩︎':''}</td><td>${money(r.costo)}</td><td>${money(r.sale_price)}</td><td>${money(r.sobrepeso)}</td>
       <td>${money(r.ingreso)}</td><td class="${cls(r.margen)}">${money(r.margen)}</td><td>${r.mes_envio||''}</td></tr>`,
      `<div class="pager"><span class="muted">En total ${fmt(d.total)} registro(s)</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="pgbtn" ${G.offset<=0?'disabled':''} onclick="repGuias(${Math.max(0,G.offset-G.limit)})">‹</button>
          <span>${fmt(from)}–${fmt(to)}</span>
          <button class="pgbtn" ${to>=d.total?'disabled':''} onclick="repGuias(${G.offset+G.limit})">›</button>
        </div></div>`);
  const q=$('#g-q'); if(q) q.addEventListener('keydown',e=>{if(e.key==='Enter')repGuias(0)});
}

    <div class="dkpi">
      <div><div class="b">Tipo</div><div class="v" style="font-size:14px">${d.tipo}${d.concepto==='extra'?' · extra':''}</div></div>
      <div><div class="b">Monto</div><div class="v">${money(d.monto)}</div></div>
      <div><div class="b">Pagado</div><div class="v">${money(d.pagado)}</div></div>
      <div><div class="b">Saldo</div><div class="v ${d.saldo>0.5?'neg':'pos'}">${money(d.saldo)}</div></div>
      <div><div class="b">Estatus</div><div class="v" style="font-size:14px">${d.estatus}</div></div>
      ${d.fecha_vencimiento?`<div><div class="b">Vence</div><div class="v" style="font-size:14px">${d.fecha_vencimiento}</div></div>`:''}
    </div>
    <div style="font-weight:700;color:#1F2937;font-size:14px;margin:2px 0 10px">Pagos / abonos</div>
    ${payForm}
    <div class="card" style="padding:0;margin-bottom:18px"><div class="tblwrap">${hist}</div></div>
    <div style="font-weight:700;color:#1F2937;font-size:14px;margin:2px 0 8px">Guías cobradas</div>
    <div class="muted" style="font-size:12px;margin-bottom:8px">${d.concepto==='extra'
      ? 'Solo las guías con <b>extra</b> (sobrepeso, retornos o desfase).'
      : 'Todas las guías cobradas al cliente.'} ${d.guias&&d.guias.length>=500?'· (primeras 500 por importe)':''}</div>
    <div class="tblwrap" style="max-height:36vh;overflow:auto">
      <table><thead><tr><th>Guía</th><th>Fecha</th><th>Producto</th><th>Destino</th><th>Kilos</th><th>Zona</th><th>Importe</th></tr></thead>
      <tbody>${(d.guias||[]).map(g=>`<tr><td>${g.guia||'—'}${g.es_retorno?' ↩︎':''}</td><td>${g.fecha||'—'}</td><td>${g.producto||'—'}</td>
        <td>${g.destino||'—'}</td><td>${fmt(g.kilos)}</td><td>${g.zona||'—'}</td><td><b>${money(g.importe)}</b></td></tr>`).join('')}</tbody></table>
    </div>`;
};
window.addPagoDetalle=async function(sid){
  const monto=Number($('#pg-monto').value); if(!(monto>0)){alert('Monto inválido');return;}
  await jpost('/api/cobro/pago',{seller_id:sid,mes:COBMES,monto,fecha:$('#pg-fecha').value||undefined,nota:$('#pg-nota').value||undefined});
  verCobroDetalle(sid); views.cobranza();
};
window.delPago=async function(id,sid){
  if(!confirm('¿Eliminar este abono?'))return;
  await jpost('/api/cobro/pago/eliminar',{id,seller_id:sid,mes:COBMES});
  verCobroDetalle(sid); views.cobranza();
};
window.subirPdf=async function(sid,input){
  const f=input.files[0]; if(!f)return;
  const fd=new FormData(); fd.append('file',f);
  $('#job').innerHTML=`<span class="dot run"></span>subiendo factura…`;
  await fetch(`/api/cobro/pdf?seller_id=${sid}&mes=${COBMES}`,{method:'POST',body:fd});
  $('#job').innerHTML=`<span class="dot ok"></span>factura adjuntada`; views.cobranza();
};
// ---- detalle de cierre (drill-down por cliente y paquetería) ----
const DETCOLS=['Cliente','Paquetería','Guías','Costo','Cobro','Margen'];
const detRow=r=>`<tr><td>${r.cliente_real||'—'}</td><td><span class="badge b-gray">${(r.carrier||'').toUpperCase()}</span></td>
   <td>${fmt(r.guias)}</td><td>${money(r.costo)}</td><td><b>${money(r.cobro)}</b></td>
   <td class="${cls(r.margen)}">${money(r.margen)}</td></tr>`;
window.openDetalleMes=function(mes){ window.DETMES=mes; VIEW='cierre-detalle'; document.querySelectorAll('#nav a').forEach(a=>a.classList.remove('active')); detalleMes(); };
async function detalleMes(){
  const mes=window.DETMES;
  const rows=await jget('/api/cierre/detalle?mes='+mes); window.DETROWS=rows;
  const tc=rows.reduce((a,r)=>a+(r.costo||0),0), ti=rows.reduce((a,r)=>a+(r.cobro||0),0);
  $('#view').innerHTML = toolbar('Detalle de cierre · '+mes,
      `${rows.length} cliente × paquetería · costo $${fmt(tc)} · cobro $${fmt(ti)} · margen $${fmt(ti-tc)}`,
      `<a class="btn btn-secondary" style="text-decoration:none" href="${dl(`/api/cierre/detalle/excel?mes=${mes}`)}">Descargar detalle</a>
       <button class="btn-secondary" onclick="go('cierre')">← Volver</button>`) +
    `<div class="filters"><input id="dm-q" placeholder="buscar cliente…" oninput="filtraDetalle()" style="min-width:240px"></div>` +
    `<div id="dm-tbl">`+tbl(DETCOLS, rows, detRow)+`</div>`;
}
window.filtraDetalle=function(){
  const q=($('#dm-q').value||'').toLowerCase();
  const rows=(window.DETROWS||[]).filter(r=>(r.cliente_real||'').toLowerCase().includes(q));
  $('#dm-tbl').innerHTML=tbl(DETCOLS, rows, detRow);
};
window.closeModal=()=>$('#modal').classList.remove('show');
function updateCierreCount(){
  const n=[...document.querySelectorAll('.cm-chk')].filter(c=>c.checked)
    .filter(c=>{const fi=document.querySelector(`.cm-file[data-c="${c.dataset.c}"]`);return fi&&fi.files[0];}).length;
  const b=$('#cm-proc'); if(b){b.textContent=n?`Procesar cierre (${n})`:'Procesar cierre';b.disabled=!n;}
}
window.toggleCarrier=c=>{
  const chk=document.querySelector(`.cm-chk[data-c="${c}"]`);
  document.querySelector(`.crow[data-c="${c}"]`).classList.toggle('off',!chk.checked);
  document.querySelector(`.cm-file[data-c="${c}"]`).disabled=!chk.checked;
  updateCierreCount();
};
window.cmFile=c=>{const fi=document.querySelector(`.cm-file[data-c="${c}"]`);
  document.querySelector(`.fname[data-c="${c}"]`).textContent=fi.files[0]?('✓ '+fi.files[0].name):'';
  updateCierreCount();};
async function waitIdle(){for(let i=0;i<800;i++){const s=await jget('/api/status');
  if(!Object.values(s.jobs||{}).some(j=>j.status==='running'))return; await new Promise(r=>setTimeout(r,1500));}}
function lastJobMsg(){ return jget('/api/status').then(s=>{
  const f=Object.values(s.jobs||{}).filter(j=>j.status!=='running')
    .sort((a,b)=>(b.finished||'').localeCompare(a.finished||''))[0];
  return f?(f.message||'').split('\n')[0]:''; }); }

window.procesarCierre=async function(){
  const mes=$('#cm-mes').value; if(!mes){alert('Selecciona el mes a cerrar');return;}
  const sel=[...document.querySelectorAll('.cm-chk')].filter(c=>c.checked).map(c=>c.dataset.c)
    .filter(c=>{const fi=document.querySelector(`.cm-file[data-c="${c}"]`);return fi&&fi.files[0];});
  if(!sel.length){alert('Sube al menos un Excel de paquetería (y deja seleccionadas solo las que apliquen).');return;}
  const files={}; sel.forEach(c=>files[c]=document.querySelector(`.cm-file[data-c="${c}"]`).files[0]);
  const steps=[...sel.map(c=>({k:'up-'+c,label:'Subir '+c.toUpperCase()})),
    {k:'rec',label:'Reconciliar guías'},{k:'cls',label:'Cerrar mes'},{k:'cob',label:'Generar cobro'}];
  $('#cm-title').textContent='Procesando cierre · '+mes;
  $('#cm-body').innerHTML=`<div class="plist">${steps.map(s=>
    `<div class="pstep" id="st-${s.k}"><span class="pic"></span><span>${s.label}</span><span class="pex"></span></div>`).join('')}</div>
    <div id="cm-summary" style="margin-top:16px"></div>`;
  $('#cm-foot').innerHTML=`<button class="btn-secondary" id="cm-close" onclick="closeModal()" disabled>Procesando…</button>`;
  const setStep=(k,st,ex)=>{const el=$('#st-'+k);if(!el)return;el.className='pstep '+st;
    el.querySelector('.pic').textContent=st==='done'?'✓':st==='err'?'✕':'';
    if(ex)el.querySelector('.pex').textContent=ex;};
  try{
    for(const c of sel){ setStep('up-'+c,'run');
      const fd=new FormData(); fd.append('file',files[c]);
      const r=await fetch(`/api/upload/carrier?carrier=${c}&reset=true`,{method:'POST',body:fd}).then(x=>x.json()).catch(()=>({error:'fallo subida'}));
      if(r&&r.error){setStep('up-'+c,'err',r.error); return finishProgress(mes,false);}
      await waitIdle(); setStep('up-'+c,'done', await lastJobMsg());
    }
    setStep('rec','run'); await jpost('/api/reconcile'); await waitIdle(); setStep('rec','done', await lastJobMsg());
    setStep('cls','run'); const cl=await jpost('/api/cierre/cerrar?mes='+mes);
    setStep('cls','done', `costo $${fmt(cl.costo)} · ingreso $${fmt(cl.ingreso)}`);
    setStep('cob','run'); const cb=await jpost('/api/cobro/generar?mes='+mes);
    setStep('cob','done', `${cb.sellers} clientes · $${fmt(cb.monto_total)}`);
    finishProgress(mes,true,cl,cb);
  }catch(e){ finishProgress(mes,false); }
};
function finishProgress(mes,ok,cl,cb){
  const b=$('#cm-close'); if(b){b.disabled=false;b.textContent='Cerrar';}
  if(VIEW==='cierre')views.cierre();
  if(ok){
    $('#cm-summary').innerHTML=`<div style="background:#F4FBF6;border:1px solid var(--gray-200);border-radius:9px;padding:13px">
      <div style="font-weight:700;color:var(--green-700);margin-bottom:5px">✓ Cierre de ${mes} listo</div>
      <div style="font-size:12.5px;color:var(--oxford);line-height:1.55">
        Costo $${fmt(cl&&cl.costo)} · Ingreso $${fmt(cl&&cl.ingreso)} · Utilidad $${fmt(cl&&cl.utilidad)}<br>
        Cobro generado: ${cb?cb.sellers:0} clientes · $${fmt(cb&&cb.monto_total)}</div>
      <button class="btn-primary btn-sm" style="margin-top:10px" onclick="closeModal();openDetalleMes('${mes}')">Ver detalle del cierre</button></div>`;
  }else{
    $('#cm-summary').innerHTML=`<div style="color:var(--red-700);font-size:13px;font-weight:600">Algo falló. Revisa el paso marcado y reintenta.</div>`;
  }
}

// router
const ROUTER={cierre:()=>views.cierre(),'cobranza':()=>views.cobranza(),'tarifas':()=>views.tarifas(),
  'rep-prepago':repPrepago,'rep-credito':repCredito,'rep-cobrar':repCobrar,'rep-guias':()=>repGuias(0)};
function go(v){VIEW=v;document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.v===v));(ROUTER[v]||ROUTER.cierre)();}
document.querySelectorAll('#nav a').forEach(a=>a.onclick=()=>go(a.dataset.v));

// jobs / acciones de datos
async function poll(){
  const s=await jget('/api/status'); const jobs=s.jobs||{};
  const run=Object.values(jobs).find(j=>j.status==='running');
  const last=Object.values(jobs).sort((a,b)=>(b.finished||'').localeCompare(a.finished||'')).find(j=>j.status!=='running');
  const el=$('#job');
  if(run)el.innerHTML=`<span class="dot run"></span>${run.name}…`;
  else if(last){const c=last.status==='error'?'err':'ok';el.innerHTML=`<span class="dot ${c}"></span>${(last.message||'').split('\\n')[0].slice(0,34)}`;}
  const b=$('#b-sync'); if(b)b.disabled=!!run;
}
window.syncCH=async function(){
  const b=$('#b-sync'); if(b)b.disabled=true;
  $('#job').innerHTML=`<span class="dot run"></span>sincronizando…`;
  await jpost('/api/sync-ch?desde=2025-01-01'); poll();
};
function wireUploads(){
  const c=$('#f-carrier'), cl=$('#f-cliente');
  if(c)c.onchange=e=>up(e.target,'/api/upload/carrier?carrier=dhl');
  if(cl)cl.onchange=e=>up(e.target,'/api/upload/cliente');
}
async function up(input,url){const f=input.files[0];if(!f)return;const fd=new FormData();fd.append('file',f);
  $('#job').innerHTML=`<span class="dot run"></span>subiendo ${f.name}…`;
  await fetch(url+(url.includes('?')?'&':'?')+'reset=true',{method:'POST',body:fd});input.value='';poll();}

function startApp(){
  go('cierre');
  poll(); setInterval(poll,3000);
}
function afterAuth(){
  $('#login').classList.remove('show');
  const lo=$('#b-logout'); if(lo)lo.style.display='block';
  startApp();
}
window.doLogin=async function(ev){
  ev.preventDefault();
  const email=$('#lg-email').value.trim(), pass=$('#lg-pass').value;
  const btn=$('#lg-btn'); btn.disabled=true; $('#lg-err').textContent='';
  const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;
  if(error||!data.session){ $('#lg-err').textContent='Correo o contraseña incorrectos.'; return false; }
  TOKEN=data.session.access_token; afterAuth(); return false;
};
window.doLogout=async function(){ if(SB)await SB.auth.signOut(); location.reload(); };
async function boot(){
  let cfg={};
  try{ cfg=await _fetch('/api/config').then(r=>r.json()); }catch(e){}
  AUTH=!!cfg.auth_enabled;
  if(!AUTH){ startApp(); return; }           // sin Supabase: app directa (dev local)
  SB=window.supabase.createClient(cfg.supabase_url, cfg.supabase_key);
  SB.auth.onAuthStateChange((_e,session)=>{ if(session)TOKEN=session.access_token; });
  const {data}=await SB.auth.getSession();
  if(data.session){ TOKEN=data.session.access_token; afterAuth(); }
  else { $('#login').classList.add('show'); }
}
boot();
</script>
